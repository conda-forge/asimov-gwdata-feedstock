{% set name = "asimov-gwdata" %}
{% set version = "0.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 368b7bec8fd1d64f683538bbe407dc6ce4959b5036845f512c19d926d88fca25

build:
  entry_points:
    - gwdata = datafind.main:get_data
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - setuptools-scm >=3.4.3
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - gwosc
    - asimov >=0.4.0
    - pesummary
    - numpy
    - requests
    - click
    - igwn-auth-utils
    - requests-pelican
    - requests-scitokens >=0.1.0

test:
  imports:
    - datafind
  commands:
    - pip check
    - cd tests && bash asimov-test-script.sh
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://git.ligo.org/asimov/pipelines/gwdata
  summary: An asimov plugin to make downloading gravitational wave data easier
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - transientlunatic
    - mj-will
